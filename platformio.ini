[platformio]
default_envs = safe-default

[env]
platform = ststm32@19.5.0
board = genericSTM32F103C8
framework = stm32cube
monitor_speed = 115200
upload_protocol = stlink
build_flags =
  -D USE_HAL_DRIVER
  -D STM32F103xB
  -D HSE_VALUE=8000000
  -D HSI_VALUE=8000000

; Public default: fan candidate pins remain high-impedance inputs and the
; historical startup fan test is excluded. Hardware output requires exact opt-in.
[env:safe-default]
build_flags =
  ${env.build_flags}
  -D ENABLE_FAN_OUTPUT=0
  -D ENABLE_STARTUP_FAN_TEST=0

; Compile-only CI coverage. Do not upload this build until the exact driver,
; fan, supply and protection circuit have been reviewed on a low-voltage bench.
[env:fan-output-opt-in]
build_flags =
  ${env.build_flags}
  -D ENABLE_FAN_OUTPUT=1
  -D ENABLE_STARTUP_FAN_TEST=1
